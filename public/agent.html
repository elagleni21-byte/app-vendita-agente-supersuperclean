<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Profilo agente</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .wrap{max-width:920px;margin:48px auto;padding:0 16px}
    .card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
    .muted{opacity:.75}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin:10px 0}
    .tag{font-size:12px;background:#f0f0f0;padding:4px 8px;border-radius:999px}
    a{color:inherit}
  </style>
</head>
<body>
  <div class="wrap">
    <a href="/search.html">← Torna alla ricerca</a>
    <div id="card" class="card" style="margin-top:12px;">Caricamento...</div>
  </div>

<script>
function esc(s){ return (s||"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

const params = new URLSearchParams(location.search);
const id = params.get("id");
const card = document.getElementById("card");

async function load(){
  if(!id){
    card.textContent = "ID mancante";
    return;
  }
  const res = await fetch("/api/public/agents/" + encodeURIComponent(id));
  const data = await res.json();
  if(!res.ok){
    card.textContent = data.error || "Agente non trovato";
    return;
  }
  const a = data.agent;

  card.innerHTML = `
    <div style="font-weight:900;font-size:22px;">${esc(a.display_name)}</div>

    <div class="row">
      <span class="tag">${esc(a.city)}</span>
      <span class="tag">${esc(a.category)}</span>
    </div>

    <div style="margin-top:10px;line-height:1.4">${esc(a.bio || "")}</div>

    <div class="row muted" style="margin-top:14px;">
      ${a.phone ? `<div>📞 ${esc(a.phone)}</div>` : ""}
      ${a.public_email ? `<div>✉️ ${esc(a.public_email)}</div>` : ""}
      ${a.website ? `<div>🌐 <a href="${esc(a.website)}" target="_blank" rel="noreferrer">${esc(a.website)}</a></div>` : ""}
    </div>
  `;
}

load();
</script>
</body>
</html>
