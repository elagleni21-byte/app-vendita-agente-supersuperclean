<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Dashboard</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .wrap{max-width:900px;margin:14px auto;padding:0 16px}
    .card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
    .muted{opacity:.75}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
    @media (max-width:720px){.grid{grid-template-columns:1fr}}
    .btn{background:#111;color:#fff;border:0;border-radius:10px;padding:10px 14px;cursor:pointer}
    .btn2{background:#f0f0f0;border:0;border-radius:10px;padding:10px 14px;cursor:pointer}
    .kpi{font-weight:900;font-size:22px;margin-top:6px}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
  </style>
</head>
<body>

  <!-- HEADER (caricato da /_header.html) -->
  <div id="appHeader"></div>

  <div class="wrap">
    <div class="card">
      <div style="font-weight:900;font-size:20px;">Dashboard</div>
      <div class="muted" id="hello" style="margin-top:6px;">Caricamento...</div>

      <div class="row">
        <button class="btn" onclick="location.href='/cart.html'">Carrello</button>
        <button class="btn2" onclick="location.href='/orders.html'">Ordini</button>
        <button class="btn2" onclick="location.href='/profile-edit.html'">Modifica profilo</button>
        <button class="btn2" onclick="location.href='/search.html'">Ricerca pubblica</button>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="muted">Ordini totali</div>
        <div class="kpi" id="kpiOrders">—</div>
      </div>
      <div class="card">
        <div class="muted">Prodotti disponibili</div>
        <div class="kpi" id="kpiProducts">—</div>
      </div>
    </div>

    <div class="card" style="margin-top:12px;">
      <div style="font-weight:800;">Suggerimento</div>
      <div class="muted" style="margin-top:6px;">
        Compila il profilo pubblico così compari nella ricerca. Poi prova a cercarti su <b>search.html</b>.
      </div>
    </div>
  </div>

<script>
/* --- carica header condiviso --- */
(async function(){
  const host = document.getElementById("appHeader");
  const res = await fetch("/_header.html");
  host.innerHTML = await res.text();
})();
</script>

<script>
/* --- auth + dati dashboard --- */
const token = localStorage.getItem("token");
if(!token) location.href="/login.html";

async function api(path){
  const res = await fetch(path, { headers:{ Authorization:"Bearer "+token }});
  const data = await res.json().catch(()=> ({}));
  if(!res.ok) throw new Error(data.error || "Errore");
  return data;
}

(async function(){
  try{
    const me = await api("/api/me");
    document.getElementById("hello").textContent =
      `Ciao ${me.me?.name || "Agente"} 👋`;

    // KPI 1: prodotti
    const prod = await api("/api/products");
    document.getElementById("kpiProducts").textContent =
      (prod.products || []).length;

    // KPI 2: ordini
    const ord = await api("/api/orders");
    document.getElementById("kpiOrders").textContent =
      (ord.orders || []).length;
  }catch(e){
    document.getElementById("hello").textContent = e.message;
  }
})();
</script>

</body>
</html>
