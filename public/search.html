<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Cerca un agente</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    .wrap{max-width:920px;margin:48px auto;padding:0 16px}
    .logo{font-size:32px;font-weight:800;margin-bottom:16px}
    .bar{display:flex;gap:10px;flex-wrap:wrap}
    .bar input{flex:1;min-width:220px}
    .results{margin-top:18px;display:grid;gap:12px}
    .card{background:#fff;border-radius:12px;padding:14px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
    .muted{opacity:.75}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin:8px 0}
    .tag{font-size:12px;background:#f0f0f0;padding:4px 8px;border-radius:999px}
    a{color:inherit;text-decoration:none}
    a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">Trova un agente</div>

    <div class="bar">
      <input id="q" placeholder="Cerca per nome o parole (es: casa, auto, assicurazioni, Mario)"/>
      <input id="city" placeholder="Città (es: Milano)"/>
      <input id="category" placeholder="Categoria (es: Immobiliare)"/>
      <button id="btn">Cerca</button>
    </div>

    <div id="info" class="muted" style="margin-top:10px;"></div>
    <div id="results" class="results"></div>
  </div>

<script>
const q = document.getElementById("q");
const city = document.getElementById("city");
const category = document.getElementById("category");
const btn = document.getElementById("btn");
const results = document.getElementById("results");
const info = document.getElementById("info");

function esc(s){ return (s||"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

async function search(){
  results.innerHTML = "";
  info.textContent = "Sto cercando...";

  const params = new URLSearchParams();
  if (q.value.trim()) params.set("q", q.value.trim());
  if (city.value.trim()) params.set("city", city.value.trim());
  if (category.value.trim()) params.set("category", category.value.trim());

  const res = await fetch("/api/public/agents?" + params.toString());
  const data = await res.json();
  const agents = data.agents || [];

  info.textContent = agents.length ? `Risultati: ${agents.length}` : "Nessun risultato";

  for (const a of agents) {
    const el = document.createElement("div");
    el.className = "card";
    el.innerHTML = `
      <div style="font-weight:800;font-size:16px;">
        <a href="/agent.html?id=${encodeURIComponent(a.id)}">${esc(a.display_name)}</a>
      </div>
      <div class="row">
        <span class="tag">${esc(a.city)}</span>
        <span class="tag">${esc(a.category)}</span>
      </div>
      <div class="muted">${esc((a.bio||"").slice(0, 160))}${(a.bio||"").length>160?"…":""}</div>
    `;
    results.appendChild(el);
  }
}

btn.addEventListener("click", search);
[q, city, category].forEach(inp => inp.addEventListener("keydown", (e)=>{ if(e.key==="Enter") search(); }));

// Legge parametri URL (es: ?q=milano)
const urlParams = new URLSearchParams(window.location.search);

if (urlParams.get("q")) {
  q.value = urlParams.get("q");
}

if (urlParams.get("city")) {
  city.value = urlParams.get("city");
}

if (urlParams.get("category")) {
  category.value = urlParams.get("category");
}

// Avvia ricerca automatica
search();
</script>
</body>
</html>
