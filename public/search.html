<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <img src="/images/logo.svg" style="height:60px;margin-bottom:10px;">
  <title>Cerca un agente</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    body{background:#0b1220;color:#eaf0ff;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;}
    .wrap{max-width:1100px;margin:40px auto;padding:0 16px}
    .top{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .logo{font-size:34px;font-weight:1000;letter-spacing:.2px}
    .sub{opacity:.75}
    .bar{
      margin-top:14px;
      display:flex;gap:10px;flex-wrap:wrap;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      border-radius:16px;
      padding:10px;
    }
    .bar input{
      flex:1;min-width:220px;
      border:0;outline:none;
      background:transparent;color:#eaf0ff;
      padding:10px;border-radius:12px;
    }
    .bar button{
      border:0;border-radius:12px;
      padding:10px 14px;
      cursor:pointer;font-weight:900;
      background:linear-gradient(90deg,#7c3aed,#2563eb);
      color:#fff;
    }
    .info{margin-top:10px;opacity:.75}
    a{color:inherit}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div>
        <div class="logo">Trova un agente</div>
        <div class="sub">Cerca per nome, città o categoria.</div>
      </div>
      <div class="sub">
        <a href="/login.html">Area agente</a>
      </div>
    </div>

    <div class="bar">
      <input id="q" placeholder="Nome o parole (es: casa, Mario, assicurazioni)"/>
      <input id="city" placeholder="Città (es: Milano)"/>
      <input id="category" placeholder="Categoria (es: Immobiliare)"/>
      <button id="btn">Cerca</button>
    </div>

    <div id="info" class="info"></div>
    <div id="results" class="cards"></div>
  </div>

<script>
const q = document.getElementById("q");
const city = document.getElementById("city");
const category = document.getElementById("category");
const btn = document.getElementById("btn");
const results = document.getElementById("results");
const info = document.getElementById("info");

function esc(s){ return (s||"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function stars(r){
  const n = Math.max(0, Math.min(5, Math.round(Number(r||0))));
  return "★★★★★".slice(0,n) + "☆☆☆☆☆".slice(0,5-n);
}

async function search(){
  results.innerHTML = "";
  info.textContent = "Sto cercando...";

  const params = new URLSearchParams();
  if (q.value.trim()) params.set("q", q.value.trim());
  if (city.value.trim()) params.set("city", city.value.trim());
  if (category.value.trim()) params.set("category", category.value.trim());

  const res = await fetch("/api/public/agents?" + params.toString());
  const data = await res.json();
  const agents = data.agents || [];

  info.textContent = agents.length ? `Risultati: ${agents.length}` : "Nessun risultato";

  for (const a of agents) {
    const img = a.photo_url || "/images/agents/placeholder.jpg";
    const el = document.createElement("div");
    el.className = "agentCard";
    el.innerHTML = `
      <img class="agentImg" src="${esc(img)}" alt="foto agente" onerror="this.src='/images/agents/placeholder.jpg'">
      <div class="agentBody">
        <div class="agentName">${esc(a.display_name)}</div>
        <div class="agentMeta">
          <span class="agentTag">📍 ${esc(a.city)}</span>
          <span class="agentTag">🏷️ ${esc(a.category)}</span>
        </div>
        <div class="stars">
          <span class="starRow">${stars(a.rating)}</span>
          <span> ${Number(a.rating||0).toFixed(1)} </span>
          <span style="opacity:.7">(${Number(a.reviews_count||0)} recensioni)</span>
        </div>
        <div class="agentBio">${esc((a.bio||"").slice(0,140))}${(a.bio||"").length>140?"…":""}</div>
        <div class="agentBtnRow">
          <button class="agentBtn" onclick="location.href='/agent.html?id=${encodeURIComponent(a.id)}'">Apri profilo</button>
          <button class="agentBtn2" onclick="copyContact('${esc(a.public_email||"")}', '${esc(a.phone||"")}')">Contatti</button>
        </div>
      </div>
    `;
    results.appendChild(el);
  }
}

function copyContact(email, phone){
  const text = (email ? ("Email: " + email + "\n") : "") + (phone ? ("Tel: " + phone) : "");
  if(!text.trim()) return alert("Nessun contatto disponibile.");
  navigator.clipboard?.writeText(text);
  alert("Contatti copiati:\n" + text);
}

// Legge parametri URL (?q=?city=?category=)
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get("q")) q.value = urlParams.get("q");
if (urlParams.get("city")) city.value = urlParams.get("city");
if (urlParams.get("category")) category.value = urlParams.get("category");

btn.addEventListener("click", search);
[q, city, category].forEach(inp => inp.addEventListener("keydown", (e)=>{ if(e.key==="Enter") search(); }));
search();
</script>
</body>
</html>
